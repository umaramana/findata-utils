<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Insight Fitness — Wireframes v5</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: 'Courier New', Courier, monospace;
  background: #ffffff;
  color: #111;
  padding: 16px 12px 32px;
}

.tab-strip {
  display: flex; flex-wrap: wrap; gap: 4px;
  width: 280px; margin: 0 auto 14px;
}
.tab {
  font-family: 'Courier New', monospace;
  font-size: 9px; padding: 3px 7px;
  border: 1.5px dashed #999;
  cursor: pointer; color: #666;
  background: #fff;
  letter-spacing: 0.05em;
}
.tab.active {
  background: #f0f0f0;
  color: #111;
  font-weight: bold; border-style: solid;
}
.tab.new {
  border-color: #1D9E75;
  color: #1D9E75;
}
.tab.new.active {
  background: #e8f8f2;
  border-style: solid;
}

.phone {
  width: 280px; margin: 0 auto;
  border: 1.5px dashed #999;
  display: flex; flex-direction: column;
  min-height: 560px;
}
.phone-body {
  flex: 1;
  display: flex; flex-direction: column;
  overflow: hidden;
}
.phone-nav {
  display: flex;
  border-top: 1.5px dashed #999;
  flex-shrink: 0;
}
.pn-item {
  flex: 1; padding: 7px 2px; text-align: center;
  font-size: 7px; color: #888;
  border-right: 1px dashed #ccc;
  font-family: 'Courier New', monospace;
}
.pn-item:last-child { border-right: none; }
.pn-item.active { color: #111; font-weight: bold; }
.pn-item.new { color: #1D9E75; }
.pn-item.new.active { color: #1D9E75; font-weight: bold; }

.wf-bar {
  border-bottom: 1.5px dashed #999;
  padding: 10px 12px;
  display: flex; justify-content: space-between; align-items: center;
  position: relative; flex-shrink: 0;
}
.wf-bar-back { font-size: 10px; color: #888; margin-right: 8px; }
.wf-bar-title { font-size: 12px; font-weight: bold; color: #111; }
.wf-bar-sub { font-size: 10px; color: #888; margin-top: 2px; }
.wf-avatar-sq {
  width: 26px; height: 26px;
  border: 1.5px dashed #999;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #888; flex-shrink: 0;
}
.wf-scroll { flex: 1; overflow-y: auto; padding-bottom: 8px; }
.wf-section { padding: 10px 12px 0; }
.wf-label {
  font-size: 9px; color: #888;
  letter-spacing: 0.1em; text-transform: uppercase; margin-bottom: 6px;
}
.wf-card {
  border: 1.5px dashed #999;
  padding: 8px 10px; margin-bottom: 6px;
  display: flex; align-items: center; gap: 8px; position: relative;
}
.wf-initials {
  width: 28px; height: 28px;
  border: 1.5px dashed #999;
  display: flex; align-items: center; justify-content: center;
  font-size: 9px; color: #888; flex-shrink: 0;
}
.wf-name { font-size: 11px; font-weight: bold; color: #111; }
.wf-meta { font-size: 9px; color: #888; margin-top: 1px; }
.wf-block {
  border: 1.5px dashed #999;
  padding: 8px 10px; margin-bottom: 6px;
  font-size: 10px; color: #888; position: relative;
}
.wf-block.tall {
  min-height: 48px; display: flex;
  align-items: center; justify-content: center;
}
.wf-block.video {
  min-height: 56px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
}
.wf-block.chart-placeholder {
  min-height: 70px; display: flex; flex-direction: column;
  align-items: center; justify-content: center; gap: 4px;
  background: #f8f8f8;
}
.wf-btn {
  border: 1.5px dashed #999;
  padding: 8px 10px; font-size: 10px;
  color: #888; text-align: center;
  margin-bottom: 6px; position: relative;
  font-family: 'Courier New', monospace;
}
.wf-btn.primary { border-style: solid; color: #111; font-weight: bold; }
.wf-btn.success { border-style: solid; border-color: #1D9E75; color: #1D9E75; font-weight: bold; }
.wf-divider { border-bottom: 1.5px dashed #999; margin: 10px 0 0; }

.badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 16px; height: 16px; border-radius: 50%;
  background: #1D9E75; color: #fff;
  font-size: 8px; font-weight: bold;
  position: absolute; top: -6px; right: -6px; z-index: 2; line-height: 1;
}
.pencil {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border: 1px dashed #999;
  font-size: 10px; flex-shrink: 0; color: #888;
}
.field-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; border-bottom: 1px dashed #eee; font-size: 10px;
}
.field-row:last-child { border-bottom: none; }
.field-label { color: #888; font-size: 9px; }
.field-val { font-weight: bold; font-size: 11px; }
.field-right { display: flex; align-items: center; gap: 6px; }
.step-pill {
  display: inline-block; font-size: 9px;
  border: 1px dashed #999;
  padding: 2px 7px; margin-bottom: 6px; color: #888;
}
.json-confirm {
  border: 1.5px dashed #999;
  padding: 8px 10px; margin-bottom: 6px;
  font-size: 9px; color: #888;
  background: #f8f8f8; position: relative;
}
.json-confirm .jc-label { font-weight: bold; font-size: 9px; margin-bottom: 4px; color: #111; }
.json-line { font-size: 8px; margin-bottom: 2px; }

/* report styles */
.rpt-header {
  background: #1A6B72; color: white; padding: 10px 12px;
  display: flex; justify-content: space-between; align-items: flex-start;
  position: relative;
}
.rpt-header-badge {
  font-size: 9px; padding: 2px 6px;
  background: rgba(255,255,255,0.2); display: inline-block; margin-bottom: 3px;
}
.rpt-header-title { font-size: 11px; font-weight: bold; line-height: 1.5; }
.rpt-ref-table { width: 100%; border-collapse: collapse; font-size: 9px; }
.rpt-ref-table th { background: #1A6B72; color: white; padding: 4px 8px; text-align: left; font-size: 8px; }
.rpt-ref-table td { padding: 3px 8px; color: #111; }
.rpt-ref-table .r-fail td { background: rgba(255,182,182,0.5); }
.rpt-ref-table .r-merit td { background: rgba(255,255,153,0.4); }
.rpt-ref-table .r-pass td { background: rgba(173,216,230,0.4); }
.rpt-two-col { display: flex; border-top: 1.5px dashed #999; position: relative; }
.rpt-left { flex: 0 0 48%; border-right: 1.5px dashed #999; display: flex; flex-direction: column; }
.rpt-img { min-height: 80px; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #888; border-bottom: 1px dashed #eee; background: #f8f8f8; }
.rpt-video { min-height: 44px; background: #111; display: flex; align-items: center; justify-content: center; font-size: 9px; color: #aaa; }
.rpt-right { flex: 1; padding: 8px; }
.rpt-section-label { font-size: 8px; font-weight: bold; letter-spacing: 0.4px; color: #1A6B72; text-transform: uppercase; margin-bottom: 6px; }
.rpt-muscle-row { padding: 5px 0; border-bottom: 1px dashed #eee; font-size: 9px; }
.rpt-muscle-row:last-child { border-bottom: none; }
.rpt-muscle-name { font-weight: bold; margin-bottom: 2px; }
.rpt-muscle-note { font-size: 8px; color: #888; }

.lib-exercise-card { border: 1.5px dashed #999; margin-bottom: 6px; position: relative; }
.lib-ex-header { padding: 8px 10px; border-bottom: 1px dashed #eee; display: flex; justify-content: space-between; align-items: flex-start; }
.lib-ex-name { font-size: 11px; font-weight: bold; }
.lib-ex-tag { font-size: 8px; padding: 1px 6px; border: 1px dashed #999; color: #888; }
.lib-ex-video { min-height: 44px; background: #f8f8f8; display: flex; align-items: center; justify-content: center; gap: 6px; font-size: 9px; color: #888; border-bottom: 1px dashed #eee; }
.lib-ex-meta { padding: 6px 10px; }
.lib-ex-row { font-size: 9px; margin-bottom: 3px; color: #888; }
.lib-ex-row span { color: #111; font-weight: bold; }

.trend-bar-wrap { display: flex; align-items: flex-end; gap: 4px; padding: 8px 0 2px; }
.trend-bar { flex: 1; background: #f0f0f0; border: 1px dashed #999; display: flex; flex-direction: column; align-items: center; justify-content: flex-end; font-size: 8px; padding-bottom: 2px; color: #888; }

/* new v5 components */
.metric-strip {
  display: flex; border: 1.5px dashed #999;
  margin-bottom: 6px; position: relative;
}
.metric-cell {
  flex: 1; padding: 6px 8px; text-align: center;
  border-right: 1px dashed #eee;
}
.metric-cell:last-child { border-right: none; }
.metric-val { font-size: 13px; font-weight: bold; color: #111; }
.metric-lbl { font-size: 8px; color: #888; margin-top: 1px; }
.metric-delta { font-size: 8px; color: #1D9E75; margin-top: 1px; }
.metric-delta.warn { color: #cc6600; }

.chart-type-row {
  display: flex; gap: 4px; margin-bottom: 6px; flex-wrap: wrap;
}
.chart-type-pill {
  font-size: 8px; padding: 2px 6px;
  border: 1px dashed #999; color: #888;
  font-family: 'Courier New', monospace; cursor: pointer;
}
.chart-type-pill.active {
  border-style: solid; border-color: #1A6B72;
  color: #1A6B72; font-weight: bold; background: #e8f5f5;
}

.form-field {
  border: 1.5px dashed #999; margin-bottom: 6px;
  position: relative;
}
.form-field-label {
  font-size: 8px; color: #888; padding: 5px 10px 0;
  letter-spacing: 0.08em; text-transform: uppercase;
}
.form-field-input {
  padding: 5px 10px 7px; font-size: 11px; font-weight: bold;
  color: #111; font-family: 'Courier New', monospace;
}
.form-field-hint { font-size: 8px; color: #bbb; padding: 0 10px 6px; }

.last-logged {
  background: #f8f8f8; border: 1px dashed #ccc;
  padding: 5px 10px; margin-bottom: 6px;
  font-size: 8px; color: #888;
  display: flex; justify-content: space-between;
}
.last-logged span { color: #111; font-weight: bold; }

.component-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; border-bottom: 1px dashed #eee; font-size: 10px;
}
.component-row:last-child { border-bottom: none; }
.component-check { width: 12px; height: 12px; border: 1px dashed #999; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 9px; }
.component-check.checked { border-style: solid; border-color: #1A6B72; color: #1A6B72; }
.component-avail { font-size: 8px; color: #1D9E75; }
.component-unavail { font-size: 8px; color: #ccc; }

.grid-picker { display: grid; grid-template-columns: 1fr 1fr; gap: 4px; margin-bottom: 6px; }
.grid-tile {
  border: 1.5px dashed #999; padding: 6px;
  display: flex; flex-direction: column; gap: 3px;
  cursor: pointer; position: relative;
}
.grid-tile.active { border-style: solid; border-color: #1A6B72; background: #e8f5f5; }
.grid-row { display: flex; gap: 2px; }
.grid-cell { border: 1px dashed #ccc; height: 14px; flex: 1; background: #f0f0f0; }
.grid-label { font-size: 7px; color: #888; text-align: center; }

.nudge-preview {
  border: 1.5px dashed #999; margin-bottom: 6px;
  background: #f8f8f8; position: relative;
}
.nudge-header {
  background: #1A6B72; color: white;
  padding: 5px 8px; font-size: 9px; font-weight: bold;
  display: flex; justify-content: space-between;
}
.nudge-chart-zone {
  min-height: 70px; display: flex; align-items: center;
  justify-content: center; font-size: 9px; color: #888;
  border-bottom: 1px dashed #eee;
}
.nudge-footer {
  padding: 4px 8px; font-size: 8px; color: #888;
  display: flex; justify-content: space-between;
}

.admin-row {
  display: flex; align-items: center; justify-content: space-between;
  padding: 6px 10px; border-bottom: 1px dashed #eee;
}
.admin-row:last-child { border-bottom: none; }
.admin-metric { font-size: 10px; color: #111; }
.admin-config-val { font-size: 9px; color: #888; border: 1px dashed #999; padding: 1px 5px; }
.admin-section { border: 1.5px dashed #999; margin-bottom: 6px; }
.admin-section-head {
  padding: 5px 10px; background: #f0f0f0; font-size: 9px;
  font-weight: bold; color: #111; border-bottom: 1px dashed #eee;
}

.qa-list { width: 280px; margin: 16px auto 0; }
.qa-row { display: flex; gap: 10px; margin-bottom: 10px; align-items: flex-start; }
.qa-badge {
  display: inline-flex; align-items: center; justify-content: center;
  width: 18px; height: 18px; border-radius: 50%;
  background: #1D9E75; color: #fff;
  font-size: 9px; font-weight: bold; flex-shrink: 0; margin-top: 1px;
}
.qa-text { font-size: 10px; color: #888; line-height: 1.5; }
.qa-context { font-size: 9px; color: #aaa; margin-top: 2px; font-style: italic; }

.intro-block { padding: 14px; }
.intro-title { font-size: 13px; font-weight: bold; margin-bottom: 4px; }
.intro-sub { font-size: 10px; color: #888; margin-bottom: 14px; line-height: 1.5; }
.intro-q { font-size: 10px; margin-bottom: 12px; line-height: 1.5; }
.intro-q span { font-weight: bold; }
.intro-hint { font-size: 9px; color: #888; font-style: italic; margin-top: 2px; }

.v5-tag {
  font-size: 7px; padding: 1px 4px;
  border: 1px solid #1D9E75; color: #1D9E75;
  display: inline-block; margin-left: 4px; vertical-align: middle;
}

.page { display: none; }
.page.active { display: block; }
</style>
</head>
<body>

<div style="width:280px;margin:0 auto 8px;font-size:9px;color:#888;text-align:center;font-family:'Courier New',monospace;">
  Insight Fitness — Wireframes v5 · Trainer app<br>
  <span style="color:#1D9E75">— — —</span> = new screens added in v5 &nbsp;|&nbsp; existing screens extended
</div>

<div class="tab-strip">
  <div class="tab active" id="t-intro" onclick="show('intro','t-intro')">Intro</div>
  <div class="tab" id="t-home" onclick="show('home','t-home')">Home</div>
  <div class="tab" id="t-client" onclick="show('client','t-client')">Client</div>
  <div class="tab new" id="t-log" onclick="show('log','t-log')">Log ✦</div>
  <div class="tab" id="t-assessment" onclick="show('assessment','t-assessment')">Assess</div>
  <div class="tab" id="t-review" onclick="show('review','t-review')">Review</div>
  <div class="tab" id="t-report" onclick="show('report','t-report')">Report</div>
  <div class="tab new" id="t-reportconfig" onclick="show('reportconfig','t-reportconfig')">Rep.Config ✦</div>
  <div class="tab" id="t-library" onclick="show('library','t-library')">Library</div>
  <div class="tab" id="t-progress" onclick="show('progress','t-progress')">Progress</div>
  <div class="tab new" id="t-chartsampler" onclick="show('chartsampler','t-chartsampler')">Charts ✦</div>
  <div class="tab new" id="t-admin" onclick="show('admin','t-admin')">Admin ✦</div>
  <div class="tab new" id="t-nudgespec" onclick="show('nudgespec','t-nudgespec')">PNG Spec ✦</div>
  <div class="tab new" id="t-deviation" onclick="show('deviation','t-deviation')">Deviation ✦</div>
</div>

<div class="phone" id="phone-shell">
  <div class="phone-body" id="phone-content"></div>
  <div class="phone-nav">
    <div class="pn-item active" id="pn-home">Home</div>
    <div class="pn-item" id="pn-clients">Clients</div>
    <div class="pn-item new" id="pn-log">Log</div>
    <div class="pn-item" id="pn-library">Library</div>
    <div class="pn-item" id="pn-progress">Progress</div>
  </div>
</div>

<div class="qa-list" id="qa-area"></div>

<!-- ═══════════════════════════════════ INTRO ═══════════════════════════════════ -->
<template id="tpl-intro">
  <div class="wf-scroll">
    <div class="intro-block">
      <div class="intro-title">Insight Fitness · v5</div>
      <div class="intro-sub">Same app, extended. Existing screens (Home, Client, Assess, Review, Report, Library, Progress) are unchanged from v4 — with additions. New screens are marked ✦.<br><br>New in v5: Log (check-in form), Report Config, Chart Sampler, Admin Config. Progress screen extended with composition charts.</div>
      <div class="intro-q"><span>New screens added</span><br>
        ✦ Log — trainer logs weight/fat%/muscle% after a session<br>
        ✦ Report Config — trainer picks client, date range, components, layout<br>
        ✦ Chart Sampler — trainer picks default chart per component<br>
        ✦ Admin — chart defaults, asset library, target values
      </div>
      <div class="intro-q"><span>Extended screens</span><br>
        Home — quick log shortcut added<br>
        Client — composition strip added (last weight/fat%/muscle%)<br>
        Progress — composition charts added below assessment trends<br>
        Report — nudge PNG preview + send options extended
      </div>
    </div>
  </div>
</template>

<!-- ═══════════════════════════════════ HOME ═══════════════════════════════════ -->
<template id="tpl-home">
  <div class="wf-bar">
    <div><div class="wf-bar-title">Good morning, Arun</div><div class="wf-bar-sub">2 clients today</div></div>
    <div class="wf-avatar-sq">pic</div>
    <span class="badge">A</span>
  </div>
  <div class="wf-scroll">
    <div class="wf-section">
      <div class="wf-label">Today's clients</div>

      <div class="wf-card"><div class="wf-initials">PS</div><div><div class="wf-name">Priya S.</div><div class="wf-meta">Ankle assessment</div></div></div>

    <div class="wf-section" style="padding-bottom:10px;">

  <div class="qa-row"><span class="qa-badge">A</span><div><div class="qa-text">Is your client list the first thing you want to see?</div><div class="qa-context">Or a summary of what's pending — reports to send, readings not logged?</div></div></div>
  <div class="qa-row"><span class="qa-badge">B</span><div><div class="qa-text">Does "weigh-in + progress check" as a session type make sense to you?</div><div class="qa-context">Or do you describe it differently?</div></div></div>
  <div class="qa-row"><span class="qa-badge">C</span><div><div class="qa-text">✦ NEW — "Log today's readings" shortcut takes you to the check-in form. Is this useful at home screen level, or would you always go through the client first?</div></div></div>
</template>

<template id="qa-client">
  <div class="qa-row"><span class="qa-badge">A</span><div><div class="qa-text">What numbers matter most at a glance for a client?</div><div class="qa-context">Sessions, last seen, open issues — or something else?</div></div></div>
  <div class="qa-row"><span class="qa-badge">B</span><div><div class="qa-text">✦ NEW — Composition strip shows last logged weight/fat%/muscle% with delta from previous. Is this the right place for it, or would you rather see it on the progress screen?</div></div></div>
  <div class="qa-row"><span class="qa-badge">C</span><div><div class="qa-text">Is seeing past assessment scores useful here, or is it clutter?</div></div></div>
</template>

<!-- ═══════════════════════════════════ LOG (NEW) ═══════════════════════════════════ -->

<script>
const navMap = {
  'intro':'pn-home','home':'pn-home','client':'pn-clients',
  'log':'pn-log',
  'assessment':'pn-home','review':'pn-home','report':'pn-home',
  'reportconfig':'pn-home',
  'library':'pn-library','progress':'pn-progress',
  'chartsampler':'pn-progress','admin':'pn-home',
  'nudgespec':'pn-home','deviation':'pn-home'
};
function show(page, tabId) {
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  document.getElementById(tabId).classList.add('active');
  document.querySelectorAll('.pn-item').forEach(n => n.classList.remove('active'));
  const navItem = document.getElementById(navMap[page]);
  if (navItem) navItem.classList.add('active');
  const tpl = document.getElementById('tpl-' + page);
  const content = document.getElementById('phone-content');
  content.innerHTML = '';
  if (tpl) content.appendChild(tpl.content.cloneNode(true));
  const qaTpl = document.getElementById('qa-' + page);
  const qaArea = document.getElementById('qa-area');
  qaArea.innerHTML = '';
  if (qaTpl) qaArea.appendChild(qaTpl.content.cloneNode(true));
}
show('intro','t-intro');
</script>
